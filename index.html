<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 奔馳貨櫃車模擬器 - 保險桿平整貼合版</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            overflow: hidden;
            background-color: #1a1c23;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        
        /* 雙側操控分頁標籤與控制列 */
        .panel-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }
        .tab-container {
            display: flex;
            gap: 5px;
            flex: 1;
        }
        .tab-btn {
            flex: 1;
            padding: 8px;
            background: #2a2a2a;
            color: #888;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px 6px 0 0;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .tab-btn.active {
            background: #007bff;
            color: #fff;
            border-color: #007bff;
        }

        /* 收合按鈕樣式 */
        .toggle-btn {
            padding: 8px 12px;
            background: #333;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.3s;
            white-space: nowrap;
        }
        .toggle-btn:hover {
            background: #444;
        }

        /* 操控介面面板 */
        #ui-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 500px;
            background: rgba(20, 20, 20, 0.9);
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
            max-height: 400px;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), padding 0.4s;
        }
        
        #ui-panel.collapsed {
            max-height: 70px;
            padding-bottom: 5px;
        }

        .panel-body-wrapper {
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: opacity 0.3s;
            opacity: 1;
        }
        #ui-panel.collapsed .panel-body-wrapper {
            opacity: 0;
            pointer-events: none;
        }
        
        .panel-content {
            display: none;
            flex-direction: column;
            gap: 10px;
        }
        .panel-content.active {
            display: flex;
        }

        .input-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px 14px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #2a2a2a;
            color: #fff;
            font-size: 15px;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #007bff;
        }
        
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 6px;
            cursor: pointer;
            background: none;
        }
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
        }

        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ccc;
            font-size: 13px;
        }
        .control-row label {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
        }
        input[type="range"] {
            flex: 1;
            accent-color: #007bff;
        }
        .hint-text {
            font-size: 11px;
            color: #ffaa00;
            margin-top: -4px;
        }
        
        .hidden-canvas {
            display: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-panel">
        <div class="panel-header">
            <div class="tab-container">
                <button class="tab-btn active" onclick="switchTab('left')">左側</button>
                <button class="tab-btn" onclick="switchTab('right')">右側</button>
            </div>
            <button class="toggle-btn" id="toggle-panel-btn" onclick="togglePanel()">收合 ▲</button>
        </div>

        <div class="panel-body-wrapper">
            <div id="panel-left" class="panel-content active">
                <div class="input-group">
                    <input type="text" id="text-input-left" value="台灣製造 奔馳全台" placeholder="輸入左側文字...">
                    <input type="color" id="color-left" value="#ffffff" title="選擇左側文字顏色">
                </div>
                <div class="control-row">
                    <label>字體大小 <input type="range" id="size-left" min="30" max="150" value="100"></label>
                </div>
                <div class="control-row">
                    <label>文字縱高 <input type="range" id="scale-left" min="0.5" max="3.0" step="0.1" value="1.0"></label>
                </div>
            </div>

            <div id="panel-right" class="panel-content">
                <div class="input-group">
                    <input type="text" id="text-input-right" value="白六物流 安全速達" placeholder="輸入右側文字...">
                    <input type="color" id="color-right" value="#ffcc00" title="選擇右側文字顏色">
                </div>
                <span class="hint-text">※ 右側文字將自動以「由右至左」逆向排列書寫</span>
                <div class="control-row">
                    <label>字體大小 <input type="range" id="size-right" min="30" max="150" value="100"></label>
                </div>
                <div class="control-row">
                    <label>文字縱高 <input type="range" id="scale-right" min="0.5" max="3.0" step="0.1" value="1.0"></label>
                </div>
            </div>

            <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 5px 0;">
            <div class="control-row">
                <label>卡車車速 <input type="range" id="speed-slider" min="0" max="200" value="100"></label>
            </div>
        </div>
    </div>

    <canvas id="canvas-left" class="hidden-canvas" width="1024" height="512"></canvas>
    <canvas id="canvas-right" class="hidden-canvas" width="1024" height="512"></canvas>
    <canvas id="canvas-logo" class="hidden-canvas" width="1024" height="256"></canvas>
    <canvas id="canvas-rear" class="hidden-canvas" width="512" height="608"></canvas>

    <script>
        let scene, camera, renderer, controls;
        let roadMaterial, truckGroup, wheelPivots = [];
        let texLeft, texRight, texLogo, texRearDoor;
        
        let truckSettings = {
            speed: 0.05,
            left: { text: "台灣製造 奔馳全台", fontSize: 100, scaleY: 1.0, textColor: "#ffffff" },
            right: { text: "白六物流 安全速達", fontSize: 100, scaleY: 1.0, textColor: "#ffcc00" }
        };

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1c23);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(-8, 5, 12);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 - 0.05;
            controls.target.set(0, 2, 2);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.55);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.75);
            dirLight.position.set(20, 40, 20);
            dirLight.castShadow = true;
            scene.add(dirLight);

            texLeft = new THREE.CanvasTexture(document.getElementById('canvas-left'));
            texRight = new THREE.CanvasTexture(document.getElementById('canvas-right'));
            texLogo = new THREE.CanvasTexture(document.getElementById('canvas-logo'));
            texRearDoor = new THREE.CanvasTexture(document.getElementById('canvas-rear'));
            
            updateContainerCanvas('left');
            updateContainerCanvas('right');
            updateLogoCanvas();
            updateRearCanvas(); 

            createEnvironment();
            createTruck();
            initUI();

            window.addEventListener('resize', onWindowResize);
        }

        window.togglePanel = function() {
            const panel = document.getElementById('ui-panel');
            const btn = document.getElementById('toggle-panel-btn');
            
            if (panel.classList.contains('collapsed')) {
                panel.classList.remove('collapsed');
                btn.innerText = "收合 ▲";
            } else {
                panel.classList.add('collapsed');
                btn.innerText = "展開 ▼";
            }
        }

        function updateContainerCanvas(side) {
            const canvas = document.getElementById(`canvas-${side}`);
            const ctx = canvas.getContext('2d');
            const data = truckSettings[side];

            ctx.fillStyle = '#2c3e50';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#243342';
            for (let i = 0; i < canvas.width; i += 32) {
                ctx.fillRect(i, 0, 4, canvas.height);
            }

            ctx.fillStyle = data.textColor;
            ctx.shadowColor = 'rgba(0, 0, 0, 0.6)';
            ctx.shadowBlur = 5;
            ctx.shadowOffsetX = 3;
            ctx.shadowOffsetY = 3;
            ctx.font = `bold ${data.fontSize}px 'PingFang TC', 'Microsoft JhengHei', sans-serif`;
            ctx.textBaseline = 'middle';

            ctx.save();
            if (side === 'left') {
                ctx.textAlign = 'center';
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.scale(1.0, data.scaleY);
                ctx.fillText(data.text, 0, 0);
            } else {
                ctx.textAlign = 'center';
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.scale(1.0, data.scaleY);
                const reversedText = data.text.split('').reverse().join('');
                ctx.fillText(reversedText, 0, 0);
            }
            ctx.restore();

            if (side === 'left') texLeft.needsUpdate = true;
            if (side === 'right') texRight.needsUpdate = true;
        }

        function updateLogoCanvas() {
            const canvas = document.getElementById('canvas-logo');
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#e74c3c';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = `bold 110px 'PingFang TC', 'Segoe UI Historic', 'Apple Color Emoji', sans-serif`;
            ctx.fillText("𓃥 White6", canvas.width / 2, canvas.height / 2, canvas.width - 80);
            
            texLogo.needsUpdate = true;
        }

        function updateRearCanvas() {
            const canvas = document.getElementById('canvas-rear');
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#1e272e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#111111';
            ctx.fillRect(canvas.width / 2 - 4, 0, 8, canvas.height); 
            
            ctx.fillStyle = '#141d26';
            for (let x = 20; x < canvas.width; x += 40) {
                if (Math.abs(x - canvas.width/2) < 20) continue;
                ctx.fillRect(x, 10, 15, canvas.height - 20);
            }

            const stripeY = canvas.height - 90;
            const stripeHeight = 25;
            for (let x = 10; x < canvas.width - 10; x += 30) {
                ctx.fillStyle = (x / 30 % 2 === 0) ? '#f1c40f' : '#e74c3c';
                ctx.fillRect(x, stripeY, 30, stripeHeight);
            }

            ctx.fillStyle = '#ffffff';
            ctx.font = "bold 32px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("white6 LOGISTICS", canvas.width / 2, 120);

            ctx.fillStyle = '#ffffff';
            ctx.fillRect(canvas.width / 2 - 70, canvas.height - 50, 140, 40);
            ctx.lineWidth = 3;
            ctx.strokeStyle = '#333333';
            ctx.strokeRect(canvas.width / 2 - 70, canvas.height - 50, 140, 40);
            
            ctx.fillStyle = '#111111';
            ctx.font = "bold 20px 'Courier New'";
            ctx.fillText("W6-2026", canvas.width / 2, canvas.height - 23);

            texRearDoor.needsUpdate = true;
        }

        function createEnvironment() {
            const roadGeometry = new THREE.PlaneGeometry(50, 500);
            const roadCanvas = document.createElement('canvas');
            roadCanvas.width = 128; roadCanvas.height = 512;
            const roadCtx = roadCanvas.getContext('2d');
            roadCtx.fillStyle = '#333333'; roadCtx.fillRect(0, 0, 128, 512);
            roadCtx.fillStyle = '#ffffff'; roadCtx.fillRect(62, 50, 4, 100); roadCtx.fillRect(62, 300, 4, 100);

            const roadTex = new THREE.CanvasTexture(roadCanvas);
            roadTex.wrapS = roadTex.wrapT = THREE.RepeatWrapping;
            roadTex.repeat.set(1, 10);

            roadMaterial = new THREE.MeshStandardMaterial({ map: roadTex, roughness: 0.8 });
            const road = new THREE.Mesh(roadGeometry, roadMaterial);
            road.rotation.x = -Math.PI / 2;
            road.receiveShadow = true;
            scene.add(road);

            for(let i = -200; i < 200; i += 40) {
                if (i === 0) continue;
                const boxGeo = new THREE.BoxGeometry(1, Math.random() * 5 + 2, 1);
                const boxMat = new THREE.MeshStandardMaterial({color: 0x3a4f3a});
                const pL = new THREE.Mesh(boxGeo, boxMat); pL.position.set(-15, boxGeo.parameters.height/2, i); scene.add(pL);
                const pR = pL.clone(); pR.position.x = 15; scene.add(pR);
            }
        }

        function createTruck() {
            truckGroup = new THREE.Group();

            const containerWidth = 3.2;
            const containerHeight = 3.8;
            const containerDepth = 11;
            
            const containerGeo = new THREE.BoxGeometry(containerWidth, containerHeight, containerDepth);
            const sideMaterials = [
                new THREE.MeshStandardMaterial({ map: texLeft }),   
                new THREE.MeshStandardMaterial({ map: texRight }),  
                new THREE.MeshStandardMaterial({ color: 0x34495e }), 
                new THREE.MeshStandardMaterial({ color: 0x1a252f }), 
                new THREE.MeshStandardMaterial({ color: 0x2c3e50 }), 
                new THREE.MeshStandardMaterial({ color: 0x2c3e50 }) 
            ];
            const truckContainer = new THREE.Mesh(containerGeo, sideMaterials);
            truckContainer.position.set(0, 2.7, -1);
            truckContainer.castShadow = true;
            truckGroup.add(truckContainer);

            const doorGeo = new THREE.PlaneGeometry(containerWidth, containerHeight);
            const doorMat = new THREE.MeshStandardMaterial({ 
                map: texRearDoor, 
                roughness: 0.5,
                polygonOffset: true,
                polygonOffsetFactor: -1, 
                polygonOffsetUnits: -1
            });
            const rearDoorMesh = new THREE.Mesh(doorGeo, doorMat);
            rearDoorMesh.rotation.y = Math.PI; 
            rearDoorMesh.position.set(0, 2.7, -1 - (containerDepth / 2) - 0.005); 
            rearDoorMesh.castShadow = true;
            truckGroup.add(rearDoorMesh);

            const cabGroup = new THREE.Group();
            const cabColor = 0xe74c3c; 
            
            const cabMainGeo = new THREE.BoxGeometry(3.2, 3.5, 3);
            const cabMainMat = new THREE.MeshStandardMaterial({ color: cabColor, roughness: 0.3 });
            const cabMain = new THREE.Mesh(cabMainGeo, cabMainMat);
            cabMain.position.set(0, 2.3, 6);
            cabMain.castShadow = true;
            cabGroup.add(cabMain);

            const glassGeo = new THREE.BoxGeometry(3.14, 1.3, 0.1); 
            const glassMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.05, metalness: 0.95 });
            const glass = new THREE.Mesh(glassGeo, glassMat);
            glass.position.set(0, 3.2, 7.51); 
            cabGroup.add(glass);

            const doorPanelGeo = new THREE.BoxGeometry(0.04, 2.4, 1.7);
            const doorPanelMat = new THREE.MeshStandardMaterial({ color: 0xd63031, roughness: 0.3 });
            const sideGlassGeo = new THREE.BoxGeometry(0.05, 1.1, 1.1);
            const sideGlassMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.05, metalness: 0.9 });

            const sideDoorL = new THREE.Mesh(doorPanelGeo, doorPanelMat);
            sideDoorL.position.set(-1.6, 2.0, 6.0); 
            const sideGlassL = new THREE.Mesh(sideGlassGeo, sideGlassMat);
            sideGlassL.position.set(-1.61, 3.2, 6.2); 
            cabGroup.add(sideDoorL, sideGlassL);

            const sideDoorR = new THREE.Mesh(doorPanelGeo, doorPanelMat);
            sideDoorR.position.set(1.6, 2.0, 6.0);
            const sideGlassR = new THREE.Mesh(sideGlassGeo, sideGlassMat);
            sideGlassR.position.set(1.61, 3.2, 6.2); 
            cabGroup.add(sideDoorR, sideGlassR);

            const brandGeo = new THREE.PlaneGeometry(2.4, 0.6);
            const brandMat = new THREE.MeshBasicMaterial({ map: texLogo });
            const brandMesh = new THREE.Mesh(brandGeo, brandMat);
            brandMesh.position.set(0, 1.9, 7.52); 
            cabGroup.add(brandMesh);

            const grilleMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.9, roughness: 0.15 });
            const grillPositionsY = [1.5, 1.35, 1.2, 1.05];
            grillPositionsY.forEach(y => {
                const gGeo = new THREE.BoxGeometry(2.0, 0.07, 0.08);
                const gMesh = new THREE.Mesh(gGeo, grilleMat);
                gMesh.position.set(0, y, 7.52);
                cabGroup.add(gMesh);
            });

            const visorGeo = new THREE.BoxGeometry(3.26, 0.25, 0.4);
            const visorMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.5 });
            const visor = new THREE.Mesh(visorGeo, visorMat);
            visor.position.set(0, 4.0, 7.4);
            cabGroup.add(visor);

            const glowMat = new THREE.MeshBasicMaterial({ color: 0xffffff }); 
            const darkFrameMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.5 });

            function createGiantHeadlight(isLeft) {
                const lightGroup = new THREE.Group();
                const sideSign = isLeft ? -1 : 1;

                const baseGeo = new THREE.BoxGeometry(0.58, 0.42, 0.1);
                const base = new THREE.Mesh(baseGeo, darkFrameMat);
                lightGroup.add(base);

                const ledHGeo = new THREE.BoxGeometry(0.46, 0.06, 0.04);
                const ledH = new THREE.Mesh(ledHGeo, glowMat);
                ledH.position.set(0, -0.14, 0.04);
                lightGroup.add(ledH);

                const ledVGeo = new THREE.BoxGeometry(0.06, 0.28, 0.04);
                const ledV = new THREE.Mesh(ledVGeo, glowMat);
                ledV.position.set(0.22 * sideSign, 0.02, 0.04);
                lightGroup.add(ledV);

                const bulbGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.04, 16);
                const bulb = new THREE.Mesh(bulbGeo, glowMat);
                bulb.rotation.x = Math.PI / 2;
                bulb.position.set(-0.06 * sideSign, 0.04, 0.04);
                lightGroup.add(bulb);

                const signalGeo = new THREE.BoxGeometry(0.06, 0.32, 0.04);
                const signalMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0xff6600, emissiveIntensity: 2.0 });
                const signal = new THREE.Mesh(signalGeo, signalMat);
                signal.position.set(-0.23 * sideSign, 0, 0.04);
                lightGroup.add(signal);

                lightGroup.position.set(1.22 * sideSign, 0.82, 7.5);
                return lightGroup;
            }

            cabGroup.add(createGiantHeadlight(true));  
            cabGroup.add(createGiantHeadlight(false)); 

            const leftSpotLight = new THREE.SpotLight(0xffffff, 5, 40, Math.PI / 4, 0.5, 0.3);
            leftSpotLight.position.set(-1.22, 0.82, 7.6);
            leftSpotLight.castShadow = true;
            
            const rightSpotLight = new THREE.SpotLight(0xffffff, 5, 40, Math.PI / 4, 0.5, 0.3);
            rightSpotLight.position.set(1.22, 0.82, 7.6);
            rightSpotLight.castShadow = true;

            const lightTargetL = new THREE.Object3D(); lightTargetL.position.set(-1.22, 0, 20);
            const lightTargetR = new THREE.Object3D(); lightTargetR.position.set(1.22, 0, 20);
            cabGroup.add(lightTargetL, lightTargetR);
            
            leftSpotLight.target = lightTargetL;
            rightSpotLight.target = lightTargetR;
            cabGroup.add(leftSpotLight, rightSpotLight);

            const fogGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.04, 16);
            const fogL = new THREE.Mesh(fogGeo, glowMat);
            fogL.rotation.x = Math.PI / 2;
            fogL.position.set(-1.22, 0.52, 7.55);
            const fogR = fogL.clone();
            fogR.position.x = 1.22;
            cabGroup.add(fogL, fogR);

            // ==================== 【修正：再次內縮 2/3 距離】 ====================
            // 將保險桿從 7.38 再往內推至 7.23，緊密貼合車頭下緣
            const bumperGeo = new THREE.BoxGeometry(3.22, 0.4, 0.2);
            const bumperMat = new THREE.MeshStandardMaterial({ color: 0x252525, roughness: 0.7 });
            const bumper = new THREE.Mesh(bumperGeo, bumperMat);
            bumper.position.set(0, 0.5, 7.23); 
            cabGroup.add(bumper);

            // 車牌同步從 7.49 再內縮至 7.34，與保險桿維持完美相對距離
            const plateGeo = new THREE.BoxGeometry(0.8, 0.2, 0.02);
            const plateMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5 });
            const plate = new THREE.Mesh(plateGeo, plateMat);
            plate.position.set(0, 0.45, 7.34);
            cabGroup.add(plate);

            const mirrorGroupL = new THREE.Group();
            const mirrorFrameGeo = new THREE.BoxGeometry(0.18, 0.7, 0.3);
            const mirrorFrameMat = new THREE.MeshStandardMaterial({ color: 0x1c1c1c, roughness: 0.6 });
            const mirrorFrame = new THREE.Mesh(mirrorFrameGeo, mirrorFrameMat);
            mirrorFrame.position.set(0, 0, 0);
            
            const mirrorGlassGeo = new THREE.BoxGeometry(0.02, 0.64, 0.26);
            const mirrorGlassMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.1, metalness: 0.9 });
            const mirrorGlass = new THREE.Mesh(mirrorGlassGeo, mirrorGlassMat);
            mirrorGlass.position.set(-0.09, 0, 0); 
            mirrorGroupL.add(mirrorFrame, mirrorGlass);

            const armGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.4);
            const armMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            const arm = new THREE.Mesh(armGeo, armMat);
            arm.rotation.z = Math.PI / 4;
            arm.position.set(0.15, 0.2, 0.1);
            mirrorGroupL.add(arm);
            mirrorGroupL.position.set(-1.75, 3.2, 7.2); 
            
            const mirrorGroupR = mirrorGroupL.clone();
            mirrorGroupR.position.x = 1.75;
            mirrorGroupR.rotation.y = Math.PI; 
            
            cabGroup.add(mirrorGroupL, mirrorGroupR);
            truckGroup.add(cabGroup);

            const chassisGeo = new THREE.BoxGeometry(3.0, 0.4, 14);
            const chassisMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            const chassis = new THREE.Mesh(chassisGeo, chassisMat);
            chassis.position.set(0, 0.8, 1);
            truckGroup.add(chassis);

            const wheelRadius = 0.7; const wheelDepth = 0.6;
            const wheelGeo = new THREE.CylinderGeometry(wheelRadius, wheelRadius, wheelDepth, 32);
            const tireMat = new THREE.MeshStandardMaterial({ color: 0x151515, roughness: 0.9 });
            
            const rimCanvas = document.createElement('canvas'); rimCanvas.width = 128; rimCanvas.height = 128;
            const rCtx = rimCanvas.getContext('2d');
            rCtx.fillStyle = '#cccccc'; rCtx.fillRect(0,0,128,128);
            rCtx.fillStyle = '#222222'; rCtx.fillRect(60, 10, 8, 108); rCtx.fillRect(10, 60, 108, 8);
            const rimTex = new THREE.CanvasTexture(rimCanvas);
            const rimMat = new THREE.MeshStandardMaterial({ map: rimTex, roughness: 0.4, metalness: 0.6 });
            
            const wheelPositions = [
                { x: 1.6, y: 0.7, z: 6 }, { x: -1.6, y: 0.7, z: 6 },
                { x: 1.6, y: 0.7, z: -2 }, { x: -1.6, y: 0.7, z: -2 },
                { x: 1.6, y: 0.7, z: -4 }, { x: -1.6, y: 0.7, z: -4 }
            ];

            wheelPositions.forEach(pos => {
                const wheelPivot = new THREE.Group();
                wheelPivot.position.set(pos.x, pos.y, pos.z);

                const wheelMesh = new THREE.Mesh(wheelGeo, [tireMat, rimMat, rimMat]);
                wheelMesh.rotation.z = Math.PI / 2;
                
                wheelPivot.add(wheelMesh);
                truckGroup.add(wheelPivot);
                wheelPivots.push(wheelPivot);
            });

            scene.add(truckGroup);
        }

        function initUI() {
            document.getElementById('text-input-left').addEventListener('input', (e) => {
                truckSettings.left.text = e.target.value || " ";
                updateContainerCanvas('left');
            });
            document.getElementById('color-left').addEventListener('input', (e) => {
                truckSettings.left.textColor = e.target.value;
                updateContainerCanvas('left');
            });
            document.getElementById('size-left').addEventListener('input', (e) => {
                truckSettings.left.fontSize = parseInt(e.target.value);
                updateContainerCanvas('left');
            });
            document.getElementById('scale-left').addEventListener('input', (e) => {
                truckSettings.left.scaleY = parseFloat(e.target.value);
                updateContainerCanvas('left');
            });

            document.getElementById('text-input-right').addEventListener('input', (e) => {
                truckSettings.right.text = e.target.value || " ";
                updateContainerCanvas('right');
            });
            document.getElementById('color-right').addEventListener('input', (e) => {
                truckSettings.right.textColor = e.target.value;
                updateContainerCanvas('right');
            });
            document.getElementById('size-right').addEventListener('input', (e) => {
                truckSettings.right.fontSize = parseInt(e.target.value);
                updateContainerCanvas('right');
            });
            document.getElementById('scale-right').addEventListener('input', (e) => {
                truckSettings.right.scaleY = parseFloat(e.target.value);
                updateContainerCanvas('right');
            });

            document.getElementById('speed-slider').addEventListener('input', (e) => {
                truckSettings.speed = parseFloat(e.target.value) * 0.0005;
            });
        }

        window.switchTab = function(side) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.panel-content').forEach(p => p.classList.remove('active'));
            
            if(side === 'left') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('panel-left').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('panel-right').classList.add('active');
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (roadMaterial && roadMaterial.map) {
                roadMaterial.map.offset.y -= truckSettings.speed * 2; 
            }

            scene.children.forEach(child => {
                if (child instanceof THREE.Mesh && child.geometry instanceof THREE.BoxGeometry && child !== truckGroup) {
                    child.position.z += truckSettings.speed * 200; 
                    if (child.position.z > 150) child.position.z = -250; 
                }
            });

            wheelPivots.forEach(pivot => {
                pivot.rotation.x += truckSettings.speed * 5;
            });

            if (truckGroup && truckSettings.speed > 0) {
                truckGroup.position.y = Math.sin(Date.now() * 0.015) * 0.03;
                truckGroup.position.z = Math.cos(Date.now() * 0.01) * 0.02; 
            }

            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
